spring.application.name=personal-finance-tracker

# ---------- Server ----------
server.port=8080

# ---------- MySQL Database ----------
# Replace YOUR_MYSQL_PASSWORD below with the password you set during MySQL install.
# Make sure a database called "finance_tracker" exists before you run the app (see setup guide).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# "update" lets Hibernate auto-create/update tables from our Java entities - perfect for learning.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- JWT ----------
# In a real production app this secret would come from an environment variable, not sit in a file.
# For this student project it's fine here - just don't use this exact string for anything real.
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000

# ---------- Email (used for "forgot password") ----------
# Using Gmail SMTP as an example. You'll need a Gmail "App Password", not your normal password
# (Google Account > Security > 2-Step Verification > App passwords). Explained in the setup guide.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-character-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
