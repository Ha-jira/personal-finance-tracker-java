<div class="auth-container">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1>Reset password</h1>
    <p class="auth-subtitle">Enter the code we emailed you</p>

    <label>Reset code</label>
    <input type="text" formControlName="token" placeholder="Paste the code from your email" />

    <label>New password</label>
    <input type="password" formControlName="newPassword" placeholder="At least 6 characters" />

    <p class="success" *ngIf="message">{{ message }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" [disabled]="form.invalid || loading">
      {{ loading ? 'Resetting...' : 'Reset password' }}
    </button>

    <div class="auth-links">
      <a routerLink="/login">Back to login</a>
    </div>
  </form>
</div>
