<div class="transactions-page">
  <div class="page-header">
    <h1>Transactions</h1>
    <button class="primary-btn" (click)="openAddForm()">+ Add Transaction</button>
  </div>

  <div class="modal-backdrop" *ngIf="showForm">
    <form class="modal-card" [formGroup]="form" (ngSubmit)="submit()">
      <h2>{{ editingId ? 'Edit' : 'Add' }} Transaction</h2>

      <label>Type</label>
      <select formControlName="type">
        <option value="INCOME">Income</option>
        <option value="EXPENSE">Expense</option>
      </select>

      <label>Category</label>
      <input list="categories" formControlName="category" placeholder="e.g. Food" />
      <datalist id="categories">
        <option *ngFor="let c of categories" [value]="c"></option>
      </datalist>

      <label>Amount</label>
      <input type="number" step="0.01" formControlName="amount" placeholder="0.00" />

      <label>Date</label>
      <input type="date" formControlName="date" />

      <label>Description (optional)</label>
      <input type="text" formControlName="description" placeholder="Notes..." />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="modal-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn" [disabled]="form.invalid">Save</button>
      </div>
    </form>
  </div>

  <table class="data-table" *ngIf="transactions.length > 0">
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Category</th>
        <th>Description</th>
        <th>Amount</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of transactions">
        <td>{{ t.date }}</td>
        <td><span class="badge" [class.income]="t.type === 'INCOME'" [class.expense]="t.type === 'EXPENSE'">{{ t.type }}</span></td>
        <td>{{ t.category }}</td>
        <td>{{ t.description }}</td>
        <td [class.income-text]="t.type === 'INCOME'" [class.expense-text]="t.type === 'EXPENSE'">
          {{ t.type === 'INCOME' ? '+' : '-' }}₹{{ t.amount | number:'1.2-2' }}
        </td>
        <td class="actions">
          <button (click)="edit(t)">Edit</button>
          <button (click)="delete(t.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p class="empty" *ngIf="transactions.length === 0">No transactions yet. Add your first one above.</p>
</div>
